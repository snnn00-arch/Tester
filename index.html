<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical Load Schedule Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .table-input { width: 100%; background: transparent; outline: none; }
        .table-input:focus { border-bottom: 1px solid #3b82f6; }
        
        /* สไตล์สำหรับการพิมพ์และสร้าง PDF */
        @media print {
            .no-print { display: none !important; }
            body { background-color: #ffffff; padding: 0; margin: 0; }
            .max-w-6xl { max-width: 100%; box-shadow: none; border: none; }
            
            /* เอาขอบกล่อง input ออกเวลาพิมพ์เพื่อให้ดูเหมือนตารางเอกสารปกติ */
            input, select, .table-input {
                appearance: none !important;
                -webkit-appearance: none !important;
                -moz-appearance: none !important;
                border: none !important;
                background: transparent !important;
                color: #0f172a !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            
            /* บังคับให้เบราว์เซอร์พิมพ์สีพื้นหลัง */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [systemType, setSystemType] = useState('1Phase'); // '1Phase' or '3Phase'
            const [installMethod, setInstallMethod] = useState('conduit_air');
            const [conduitType, setConduitType] = useState('pvc');
            const [circuits, setCircuits] = useState([
                { id: 1, description: 'Lighting (ชั้น 1)', qty: 1, watt: 1000, pf: 1.0, va: 1000, df: 100, phase: 'A', cbType: 'MCB', cbPoles: '1P', cb: 10, wire: '1.5' },
                { id: 2, description: 'Receptacles (เต้ารับทั่วไป)', qty: 1, watt: 1500, pf: 1.0, va: 1500, df: 100, phase: 'B', cbType: 'RCBO', cbPoles: '1P', cb: 16, wire: '2.5' },
                { id: 3, description: 'Air Conditioner 12,000 BTU', qty: 1, watt: 1200, pf: 0.8, va: 1500, df: 100, phase: 'C', cbType: 'MCB', cbPoles: '1P', cb: 16, wire: '2.5' },
                { id: 4, description: 'Water Heater 4,500W', qty: 1, watt: 4500, pf: 1.0, va: 4500, df: 100, phase: 'A', cbType: 'RCBO', cbPoles: '1P', cb: 20, wire: '4' },
            ]);
            
            const fileRef = useRef(null);

            useEffect(() => {
                if (installMethod === 'surface') {
                    setConduitType('none');
                } else if (conduitType === 'none') {
                    setConduitType('pvc'); // คืนค่าเป็นท่อ PVC ปกติเมื่อเปลี่ยนกลับมาร้อยท่อ
                }
            }, [installMethod]);

            // ฟังก์ชันสำหรับบันทึกข้อมูล (Save)
            const handleSave = () => {
                const data = { systemType, installMethod, conduitType, circuits };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "load_schedule.json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // ฟังก์ชันสำหรับโหลดข้อมูล (Load)
            const handleLoad = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.circuits) setCircuits(data.circuits);
                        if (data.systemType) setSystemType(data.systemType);
                        if (data.installMethod) setInstallMethod(data.installMethod);
                        if (data.conduitType) setConduitType(data.conduitType);
                    } catch (err) {
                        alert("รูปแบบไฟล์ไม่ถูกต้อง หรือไฟล์เสียหาย");
                    }
                };
                reader.readAsText(file);
                e.target.value = null; // reset input
            };

            // ตารางพิกัดทนกระแสของสายไฟ (อ้างอิง วสท. 2564 ตาราง 5-20 เดินสายในท่อ กลุ่ม 2)
            const getWireAmpacity = (wire, method, phase) => {
                const ampacities = {
                    'conduit_air': { // กลุ่ม 2 (ร้อยท่อในอากาศ/ฝังผนัง)
                        '1Phase': { '1.5': 15, '2.5': 21, '4': 28, '6': 36, '10': 50, '16': 66, '25': 84, '35': 104, '50': 125 },
                        '3Phase': { '1.5': 13, '2.5': 18, '4': 24, '6': 31, '10': 44, '16': 59, '25': 73, '35': 90, '50': 108 }
                    },
                    'surface': { // กลุ่ม 3 (เดินลอยเกาะผนัง/ตีกิ๊บ)
                        '1Phase': { '1.5': 17, '2.5': 23, '4': 32, '6': 41, '10': 57, '16': 76, '25': 101, '35': 125, '50': 151 },
                        '3Phase': { '1.5': 15, '2.5': 21, '4': 28, '6': 36, '10': 50, '16': 66, '25': 89, '35': 110, '50': 134 }
                    },
                    'conduit_ug': { // กลุ่ม 5 (ร้อยท่อฝังดิน)
                        '1Phase': { '1.5': 21, '2.5': 28, '4': 36, '6': 46, '10': 62, '16': 81, '25': 104, '35': 124, '50': 148 },
                        '3Phase': { '1.5': 19, '2.5': 25, '4': 33, '6': 41, '10': 55, '16': 72, '25': 93, '35': 112, '50': 132 }
                    }
                };
                return (ampacities[method] && ampacities[method][phase] && ampacities[method][phase][wire]) || 0;
            };

            const isWireValid = (c) => {
                // หากเป็นเบรกเกอร์ 3P หรือ 4P ให้คิดพิกัดกระแสสายไฟแบบ 3 เฟส (นำกระแส 3 เส้น)
                const loadPhase = (c.cbPoles === '3P' || c.cbPoles === '4P') ? '3Phase' : '1Phase';
                return Number(c.cb) <= getWireAmpacity(c.wire, installMethod, loadPhase);
            };

            const isCBValid = (c) => {
                // ตรวจสอบว่าขนาด CB ใหญ่เพียงพอกับกระแสที่ไหลผ่านจริงหรือไม่ (เปลี่ยนเป็นใช้ Conn. VA ตามมาตรฐานวงจรย่อย)
                const connectedVA = (Number(c.qty) || 0) * (Number(c.va) || 0);
                const amps = (c.cbPoles === '3P' || c.cbPoles === '4P') ? (connectedVA / (Math.sqrt(3) * 400)) : (connectedVA / 230);
                return Number(c.cb) >= amps;
            };

            // ฟังก์ชันคำนวณขนาดสายดิน (G) อัตโนมัติตามขนาดเบรกเกอร์ (CB) อ้างอิง วสท. 2564 ตาราง 4-2
            const getGroundWireSize = (cb) => {
                const cbValue = Number(cb);
                if (cbValue <= 20) return '2.5';
                if (cbValue <= 40) return '4';
                if (cbValue <= 70) return '6';
                if (cbValue <= 100) return '10';
                return '16'; // Fallback
            };

            const calculations = useMemo(() => {
                let totalConnectedVA = 0;
                let totalDemandVA = 0;
                let phaseA_VA = 0;
                let phaseB_VA = 0;
                let phaseC_VA = 0;

                circuits.forEach(c => {
                    const connectedLoad = (Number(c.qty) || 0) * (Number(c.va) || 0);
                    const df = c.df !== undefined ? Number(c.df) : 100;
                    const demandLoad = connectedLoad * (df / 100);
                    
                    totalConnectedVA += connectedLoad;
                    totalDemandVA += demandLoad;

                    if (systemType === '3Phase') {
                        if (c.cbPoles === '3P' || c.cbPoles === '4P') {
                            // โหลด 3 เฟส จะถูกหารเฉลี่ยลงแต่ละเฟส (Balanced)
                            phaseA_VA += demandLoad / 3;
                            phaseB_VA += demandLoad / 3;
                            phaseC_VA += demandLoad / 3;
                        } else {
                            if (c.phase === 'A') phaseA_VA += demandLoad;
                            if (c.phase === 'B') phaseB_VA += demandLoad;
                            if (c.phase === 'C') phaseC_VA += demandLoad;
                        }
                    } else {
                        phaseA_VA += demandLoad; // All on Phase A for 1-Phase
                    }
                });

                const voltage = systemType === '1Phase' ? 230 : 400;
                let totalAmps = 0;
                
                if (systemType === '1Phase') {
                    totalAmps = totalDemandVA / voltage;
                } else {
                    // For 3-phase, total amps per phase is considered. We take the max phase for main breaker sizing.
                    const maxPhaseVA = Math.max(phaseA_VA, phaseB_VA, phaseC_VA);
                    totalAmps = maxPhaseVA / 230; // Max current on the heaviest loaded phase
                }

                let mainCB = 0;
                let mainWire = '0';
                let meterSize = '';

                // Simplified MEA Standard approximation (from Table 3-4 & MEA guidelines)
                if (systemType === '1Phase') {
                    if (totalAmps <= 10) { mainCB = 16; mainWire = '4 หรือ 10'; meterSize = '5(15)A'; }
                    else if (totalAmps <= 30) { mainCB = 50; mainWire = '10'; meterSize = '15(45)A'; }
                    else if (totalAmps <= 75) { mainCB = 100; mainWire = '25 หรือ 35'; meterSize = '30(100)A'; }
                    else { mainCB = 'เกินมาตรฐานทั่วไป'; mainWire = '-'; meterSize = 'ต้องการออกแบบพิเศษ'; }
                } else {
                    if (totalAmps <= 30) { mainCB = 50; mainWire = '10'; meterSize = '15(45)A 3P'; }
                    else if (totalAmps <= 75) { mainCB = 100; mainWire = '25 หรือ 35'; meterSize = '30(100)A 3P'; }
                    else if (totalAmps <= 100) { mainCB = 125; mainWire = '35'; meterSize = '50(150)A 3P'; }
                    else { mainCB = 'เกินมาตรฐานทั่วไป'; mainWire = '-'; meterSize = 'ต้องการออกแบบพิเศษ'; }
                }

                let panelRecommendation = "";
                const numCircuits = circuits.length;
                
                if (systemType === '1Phase') {
                    // Logic สำหรับตู้ Consumer Unit Split Bus (อ้างอิง Schneider)
                    // ถ้า Main CB <= 40A ใช้ RCCB 40A, ถ้าเกินใช้ 63A
                    let isHighAmp = (typeof mainCB === 'number' && mainCB > 40) || totalAmps > 40;
                    let rccbSize = isHighAmp ? "63A" : "40A";
                    let rccbModelSuffix = isHighAmp ? "R63" : "R40";
                    
                    // เผื่อช่องว่างไว้ 2-4 ช่อง
                    let neededWays = numCircuits + 2; 

                    if (neededWays <= 8) {
                        panelRecommendation = `ตู้คอนซูมเมอร์ Split Bus 4+4 ช่อง\n(S9HCL14X4${rccbModelSuffix}) + RCCB ${rccbSize}`;
                    } else if (neededWays <= 12) {
                        panelRecommendation = `ตู้คอนซูมเมอร์ Split Bus 8+4 ช่อง\n(S9HCL18X4${rccbModelSuffix}) + RCCB ${rccbSize}`;
                    } else if (neededWays <= 16) {
                        panelRecommendation = `ตู้คอนซูมเมอร์ Split Bus 8+8 ช่อง\n(S9HCL18X8${rccbModelSuffix}) + RCCB ${rccbSize}`;
                    } else {
                        panelRecommendation = `วงจรเกิน 16 ช่อง\nควรแยกเป็น 2 ตู้คอนซูมเมอร์`;
                    }
                } else {
                    // Logic สำหรับตู้ Load Center (อ้างอิง Schneider EZC)
                    let frameSize = (typeof mainCB === 'number' && mainCB <= 100) ? "100" : "250";
                    // เผื่อช่องว่างไว้ประมาณ 20%
                    let requiredWays = Math.ceil(numCircuits * 1.2); 
                    let availableWays = [12, 18, 24, 30, 36, 42, 48];
                    let selectedWays = availableWays.find(w => w >= requiredWays) || 48;

                    if (requiredWays > 48) {
                        panelRecommendation = `วงจรย่อยเกิน 48 ช่อง\nควรพิจารณาใช้ตู้ MDB หรือแยกตู้`;
                    } else {
                        panelRecommendation = `ตู้โหลดเซ็นเตอร์ EZC ${frameSize}A จำนวน ${selectedWays} ช่อง\n(QO3-${frameSize}EZ${selectedWays}G/SN)`;
                    }
                }

                return { totalConnectedVA, totalDemandVA, phaseA_VA, phaseB_VA, phaseC_VA, totalAmps, mainCB, mainWire, meterSize, panelRecommendation };
            }, [circuits, systemType]);

            const addCircuit = () => {
                setCircuits([...circuits, { 
                    id: Date.now(), description: 'New Circuit', qty: 1, watt: 0, pf: 1.0, va: 0, df: 100, 
                    phase: systemType === '1Phase' ? 'A' : 'A', cbType: 'MCB', cbPoles: '1P', cb: 16, wire: '2.5' 
                }]);
            };

            const removeCircuit = (id) => {
                setCircuits(circuits.filter(c => c.id !== id));
            };

            const updateCircuit = (id, field, value) => {
                setCircuits(circuits.map(c => {
                    if (c.id === id) {
                        const newC = { ...c, [field]: value };
                        // คำนวณ VA อัตโนมัติเมื่อมีการเปลี่ยนค่า Watt หรือ PF
                        if (field === 'watt' || field === 'pf') {
                            const w = Number(newC.watt) || 0;
                            const p = Number(newC.pf) || 1;
                            newC.va = Math.round(w / (p <= 0 ? 1 : p));
                        }
                        return newC;
                    }
                    return c;
                }));
            };

            const balancePhases = () => {
                let phaseLoadsMap = { A: 0, B: 0, C: 0 };
                let phaseAssignmentMap = {};

                // นำวงจรมาเรียงลำดับจาก โหลดมาก -> โหลดน้อย โดยคิดที่ Demand Load
                const sortedCircuits = [...circuits].sort((a, b) => {
                    const dfA = a.df !== undefined ? Number(a.df) : 100;
                    const dfB = b.df !== undefined ? Number(b.df) : 100;
                    const demandLoadA = (Number(a.qty) || 0) * (Number(a.va) || 0) * (dfA / 100);
                    const demandLoadB = (Number(b.qty) || 0) * (Number(b.va) || 0) * (dfB / 100);
                    return demandLoadB - demandLoadA;
                });

                // จ่ายวงจรเข้าเฟสที่ยังมีผลรวมโหลดน้อยที่สุดในขณะนั้น (Greedy Algorithm)
                sortedCircuits.forEach(c => {
                    const df = c.df !== undefined ? Number(c.df) : 100;
                    const demandLoad = (Number(c.qty) || 0) * (Number(c.va) || 0) * (df / 100);
                    let minPhase = 'A';
                    if (phaseLoadsMap.B < phaseLoadsMap[minPhase]) minPhase = 'B';
                    if (phaseLoadsMap.C < phaseLoadsMap[minPhase]) minPhase = 'C';

                    phaseAssignmentMap[c.id] = minPhase;
                    phaseLoadsMap[minPhase] += demandLoad;
                });

                // อัปเดตเฟสกลับไปยัง state เดิม
                setCircuits(circuits.map(c => ({
                    ...c,
                    phase: phaseAssignmentMap[c.id]
                })));
            };

            const autoSizeCircuits = () => {
                setCircuits(circuits.map(c => {
                    // คำนวณกระแสจาก Connected VA โดยตรง (ไม่เอา DF มาคูณ)
                    const connectedVA = (Number(c.qty) || 0) * (Number(c.va) || 0);
                    const amps = (c.cbPoles === '3P' || c.cbPoles === '4P') ? (connectedVA / (Math.sqrt(3) * 400)) : (connectedVA / 230);
                    
                    // เลือก CB: เผื่อความปลอดภัยจากโหลด 25% (Continuous Load)
                    const requiredAmps = amps * 1.25; 
                    const cbSizes = [10, 16, 20, 25, 32, 40, 50, 63, 80, 100];
                    let recCB = cbSizes.find(size => size >= requiredAmps) || 100;
                    
                    // เลือกขนาดสายไฟ (L/N): เลือกขนาดเล็กสุดที่ทนกระแสได้ >= ขนาดเบรกเกอร์ (CB)
                    const loadPhase = (c.cbPoles === '3P' || c.cbPoles === '4P') ? '3Phase' : '1Phase';
                    const wireSizes = ['1.5', '2.5', '4', '6', '10', '16', '25', '35', '50'];
                    let recWire = wireSizes.find(w => getWireAmpacity(w, installMethod, loadPhase) >= recCB) || '50';
                    
                    return { ...c, cb: recCB, wire: recWire };
                }));
            };

            return (
                <div className="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
                    {/* Header */}
                    <div className="bg-slate-800 text-white p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-2xl font-bold flex items-center gap-2">
                                <svg className="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                ออกแบบตารางโหลดไฟฟ้า (Load Schedule)
                            </h1>
                            <p className="text-slate-300 mt-2 text-sm">อ้างอิงมาตรฐาน วสท. 2564 และข้อกำหนดการไฟฟ้านครหลวง (MEA)</p>
                        </div>
                        
                        {/* Toolbar Buttons */}
                        <div className="flex flex-wrap gap-2 no-print">
                            <input type="file" accept=".json" ref={fileRef} style={{display: 'none'}} onChange={handleLoad} />
                            <button onClick={() => fileRef.current.click()} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm font-medium flex items-center gap-2 transition-colors">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                โหลดข้อมูล
                            </button>
                            <button onClick={handleSave} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm font-medium flex items-center gap-2 transition-colors">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                                บันทึก (Save)
                            </button>
                            <button onClick={() => window.print()} className="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium flex items-center gap-2 transition-colors shadow-sm text-white">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                สร้างสรุป PDF
                            </button>
                        </div>
                    </div>

                    {/* Settings */}
                    <div className="p-6 border-b border-slate-100 flex flex-wrap gap-6 items-center bg-slate-50">
                        <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">ระบบไฟฟ้า (System)</label>
                            <select 
                                value={systemType} 
                                onChange={(e) => setSystemType(e.target.value)}
                                className="bg-white border border-slate-300 text-slate-700 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="1Phase">1 Phase 2 Wires (230V)</option>
                                <option value="3Phase">3 Phase 4 Wires (230/400V)</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">รูปแบบการติดตั้ง</label>
                            <select 
                                value={installMethod} 
                                onChange={(e) => setInstallMethod(e.target.value)}
                                className="bg-white border border-slate-300 text-slate-700 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="conduit_air">ร้อยท่อเกาะผนัง/ฝังผนัง (กลุ่ม 2)</option>
                                <option value="surface">เดินลอยตีกิ๊บ (กลุ่ม 3)</option>
                                <option value="conduit_ug">ร้อยท่อฝังดิน (กลุ่ม 5)</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">ชนิดท่อร้อยสาย</label>
                            <select 
                                value={conduitType} 
                                onChange={(e) => setConduitType(e.target.value)}
                                disabled={installMethod === 'surface'}
                                className="bg-white border border-slate-300 text-slate-700 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-100 disabled:text-slate-400"
                            >
                                <option value="pvc">ท่อพีวีซี (PVC / uPVC)</option>
                                <option value="emt">ท่อโลหะบาง (EMT)</option>
                                <option value="imc">ท่อโลหะหนาปานกลาง (IMC)</option>
                                <option value="rsc">ท่อโลหะหนา (RSC)</option>
                                <option value="hdpe">ท่อเอชดีพีอีฝังดิน (HDPE)</option>
                                <option value="none" hidden>ไม่มี (No Conduit)</option>
                            </select>
                        </div>
                    </div>

                    {/* Main Table */}
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider">
                                    <th className="p-4 font-medium border-b border-slate-200">Ckt No.</th>
                                    <th className="p-4 font-medium border-b border-slate-200 min-w-[150px]">Description</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-16">Qty</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-24">Watt/Unit</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-20">PF</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-24">VA/Unit</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-24">Conn. VA</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-20">DF(%)</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-24">Demand VA</th>
                                    {systemType === '3Phase' && <th className="p-4 font-medium border-b border-slate-200 w-20">Phase</th>}
                                    <th className="p-4 font-medium border-b border-slate-200 w-32">Breaker</th>
                                    <th className="p-4 font-medium border-b border-slate-200 w-32">Wire L/N/G</th>
                                    <th className="p-4 font-medium border-b border-slate-200 text-center no-print">Action</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm">
                                {circuits.map((c, index) => {
                                    const connectedVA = (Number(c.qty) || 0) * (Number(c.va) || 0);
                                    const df = c.df !== undefined ? Number(c.df) : 100;
                                    const demandVA = connectedVA * (df / 100);
                                    return (
                                        <tr key={c.id} className="hover:bg-slate-50 border-b border-slate-100 transition-colors">
                                            <td className="p-4 text-slate-500">{index + 1}</td>
                                            <td className="p-4"><input type="text" value={c.description} onChange={(e) => updateCircuit(c.id, 'description', e.target.value)} className="table-input font-medium text-slate-700"/></td>
                                            <td className="p-4"><input type="number" min="1" value={c.qty} onChange={(e) => updateCircuit(c.id, 'qty', e.target.value)} className="table-input"/></td>
                                            <td className="p-4"><input type="number" min="0" value={c.watt !== undefined ? c.watt : c.va} onChange={(e) => updateCircuit(c.id, 'watt', e.target.value)} className="table-input text-blue-600 font-medium"/></td>
                                            <td className="p-4"><input type="number" min="0.1" max="1" step="0.05" value={c.pf !== undefined ? c.pf : 1.0} onChange={(e) => updateCircuit(c.id, 'pf', e.target.value)} className="table-input"/></td>
                                            <td className="p-4"><input type="number" min="0" value={c.va} onChange={(e) => updateCircuit(c.id, 'va', e.target.value)} title="คำนวณอัตโนมัติ (Watt / PF)" className="table-input bg-slate-100 rounded px-2 py-1 text-slate-600 font-semibold border border-slate-200"/></td>
                                            <td className="p-4 text-slate-500">{connectedVA.toLocaleString()}</td>
                                            <td className="p-4"><input type="number" min="0" max="100" value={c.df !== undefined ? c.df : 100} onChange={(e) => updateCircuit(c.id, 'df', e.target.value)} className="table-input text-emerald-600 font-medium"/></td>
                                            <td className="p-4 font-semibold text-slate-800">{demandVA.toLocaleString()}</td>
                                            {systemType === '3Phase' && (
                                                <td className="p-4">
                                                    {(c.cbPoles === '3P' || c.cbPoles === '4P') ? (
                                                        <div className="text-[10px] font-bold text-center bg-slate-200 text-slate-500 py-1.5 px-1 rounded border border-slate-300">
                                                            A,B,C
                                                        </div>
                                                    ) : (
                                                        <div className="flex bg-slate-100 rounded-md border border-slate-200 p-0.5 w-max">
                                                            {['A', 'B', 'C'].map(p => (
                                                                <button
                                                                    key={p}
                                                                    onClick={() => updateCircuit(c.id, 'phase', p)}
                                                                    className={`w-7 h-7 rounded text-xs font-bold flex items-center justify-center transition-all ${
                                                                        c.phase !== p ? 'text-slate-500 hover:bg-slate-200' :
                                                                        p === 'A' ? 'bg-red-500 text-white shadow-sm' :
                                                                        p === 'B' ? 'bg-yellow-400 text-slate-900 shadow-sm' :
                                                                        'bg-blue-500 text-white shadow-sm'
                                                                    }`}
                                                                >
                                                                    {p}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    )}
                                                </td>
                                            )}
                                            <td className="p-4">
                                                <div className="flex flex-col gap-1.5 w-28">
                                                    <select value={c.cbType} onChange={(e) => updateCircuit(c.id, 'cbType', e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 rounded text-xs py-1 px-2 outline-none focus:border-blue-500 w-full font-medium shadow-sm table-input">
                                                        <option value="MCB">MCB</option>
                                                        <option value="RCBO">RCBO</option>
                                                        <option value="MCCB">MCCB</option>
                                                        <option value="RCCB">RCCB</option>
                                                    </select>
                                                    <div className="flex gap-1 items-start">
                                                        <select value={c.cbPoles} onChange={(e) => updateCircuit(c.id, 'cbPoles', e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 rounded text-xs py-1 px-0.5 outline-none focus:border-blue-500 w-10 shadow-sm font-medium text-center table-input">
                                                            <option value="1P">1P</option>
                                                            <option value="2P">2P</option>
                                                            <option value="3P">3P</option>
                                                            <option value="4P">4P</option>
                                                        </select>
                                                        <div className="flex flex-col flex-1">
                                                            <select value={c.cb} onChange={(e) => updateCircuit(c.id, 'cb', e.target.value)} className={`bg-slate-50 border border-slate-200 text-slate-700 rounded text-xs py-1 px-0.5 outline-none focus:border-blue-500 w-full shadow-sm font-medium text-center table-input ${!isCBValid(c) ? 'text-red-600 font-bold border-red-300 bg-red-50' : ''}`}>
                                                                <option value="10">10 A</option>
                                                                <option value="16">16 A</option>
                                                                <option value="20">20 A</option>
                                                                <option value="25">25 A</option>
                                                                <option value="32">32 A</option>
                                                                <option value="40">40 A</option>
                                                                <option value="50">50 A</option>
                                                                <option value="63">63 A</option>
                                                                <option value="80">80 A</option>
                                                                <option value="100">100 A</option>
                                                            </select>
                                                            {!isCBValid(c) && (
                                                                <span className="text-[10px] text-red-500 mt-1 leading-tight no-print block font-semibold">
                                                                    CB จะทริป (เล็กไป)
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex flex-col gap-1.5">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-slate-500 font-bold text-xs w-3">L</span>
                                                        <select 
                                                            value={c.wire} 
                                                            onChange={(e) => updateCircuit(c.id, 'wire', e.target.value)} 
                                                            className={`bg-white border border-slate-200 rounded text-xs py-0.5 px-1 outline-none focus:border-blue-500 w-14 table-input ${!isWireValid(c) ? 'text-red-600 font-bold border-red-300' : ''}`}
                                                        >
                                                            <option value="1.5">1.5</option><option value="2.5">2.5</option><option value="4">4</option>
                                                            <option value="6">6</option><option value="10">10</option><option value="16">16</option>
                                                            <option value="25">25</option><option value="35">35</option><option value="50">50</option>
                                                        </select>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-slate-500 font-bold text-xs w-3">N</span>
                                                        <span className="text-xs font-medium text-slate-700 bg-slate-100 border border-slate-200 rounded px-2 py-0.5 w-14 text-center table-input">{c.wire}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-slate-500 font-bold text-xs w-3">G</span>
                                                        <span className="text-xs font-medium text-emerald-700 bg-emerald-50 border border-emerald-200 rounded px-2 py-0.5 w-14 text-center table-input">{getGroundWireSize(c.cb)}</span>
                                                    </div>
                                                    {!isWireValid(c) && (
                                                        <span className="text-[10px] text-red-500 mt-1 leading-tight no-print">
                                                            L เล็กกว่าพิกัด
                                                        </span>
                                                    )}
                                                </div>
                                            </td>
                                            <td className="p-4 text-center no-print">
                                                <button onClick={() => removeCircuit(c.id)} className="text-red-400 hover:text-red-600 transition-colors">
                                                    <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    <div className="p-4 border-b border-slate-200 flex flex-wrap gap-4 justify-between items-center bg-slate-50/50 no-print">
                        <button onClick={addCircuit} className="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1 transition-colors">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                            เพิ่มวงจรย่อย (Add Circuit)
                        </button>
                        
                        <div className="flex gap-2">
                            <button onClick={autoSizeCircuits} className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 shadow-sm transition-colors">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                แนะนำขนาด CB & สาย (Auto Size)
                            </button>
                            {systemType === '3Phase' && (
                                <button onClick={balancePhases} className="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 shadow-sm transition-colors">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                                    เกลี่ยโหลด 3 เฟส (Auto Balance)
                                </button>
                            )}
                        </div>
                    </div>

                    {(circuits.some(c => !isWireValid(c) || !isCBValid(c))) && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 m-4 rounded-md no-print">
                            <div className="flex">
                                <div className="flex-shrink-0">
                                    <svg className="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                </div>
                                <div className="ml-3">
                                    <p className="text-sm text-red-700 font-bold">
                                        ข้อควรระวัง: ตรวจพบความผิดปกติของการออกแบบขนาดอุปกรณ์
                                    </p>
                                    <ul className="text-xs text-red-600 mt-1 list-disc pl-4 space-y-1">
                                        {circuits.some(c => !isWireValid(c)) && (
                                            <li>พิกัดทนกระแสของสายไฟ เล็กกว่า พิกัดเบรกเกอร์ (CB) ซึ่งเสี่ยงต่อปัญหาสายไฟละลายหรือไฟไหม้</li>
                                        )}
                                        {circuits.some(c => !isCBValid(c)) && (
                                            <li>ขนาดเบรกเกอร์ (CB) เล็กกว่ากระแสโหลดที่เกิดจริง ซึ่งจะทำให้เบรกเกอร์ทริป (Trip) ตัดไฟบ่อย</li>
                                        )}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Summary Section */}
                    <div className="bg-slate-50 p-6 flex flex-col md:flex-row gap-6 justify-between items-start border-t border-slate-200">
                        <div className="flex-1 space-y-4 w-full">
                            <h3 className="text-lg font-bold text-slate-800 border-b pb-2">สรุปโหลด (Load Summary)</h3>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-100">
                                    <p className="text-xs text-slate-500 font-medium">Conn. Load (VA)</p>
                                    <p className="text-lg font-bold text-slate-400">{calculations.totalConnectedVA.toLocaleString()}</p>
                                </div>
                                <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-100 border-b-2 border-blue-500">
                                    <p className="text-xs text-blue-600 font-bold">Demand Load (VA)</p>
                                    <p className="text-xl font-bold text-blue-700">{calculations.totalDemandVA.toLocaleString()}</p>
                                </div>
                                {systemType === '3Phase' && (
                                    <React.Fragment>
                                        <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-100 border-l-4 border-l-red-500">
                                            <p className="text-xs text-slate-500 font-medium">Phase A (VA)</p>
                                            <p className="text-lg font-semibold text-slate-700">{calculations.phaseA_VA.toLocaleString(undefined, {maximumFractionDigits:0})}</p>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-100 border-l-4 border-l-yellow-500">
                                            <p className="text-xs text-slate-500 font-medium">Phase B (VA)</p>
                                            <p className="text-lg font-semibold text-slate-700">{calculations.phaseB_VA.toLocaleString(undefined, {maximumFractionDigits:0})}</p>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-100 border-l-4 border-l-blue-500">
                                            <p className="text-xs text-slate-500 font-medium">Phase C (VA)</p>
                                            <p className="text-lg font-semibold text-slate-700">{calculations.phaseC_VA.toLocaleString(undefined, {maximumFractionDigits:0})}</p>
                                        </div>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>

                        <div className="w-full md:w-80 bg-blue-600 text-white p-6 rounded-xl shadow-md" style={{WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact'}}>
                            <h3 className="text-sm font-medium text-blue-100 mb-4 uppercase tracking-wide">คำแนะนำเบื้องต้น (Recommendation)</h3>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center border-b border-blue-500 pb-2">
                                    <span className="text-blue-100">กระแสสูงสุด (Max Amps)</span>
                                    <span className="font-bold text-lg">{calculations.totalAmps.toFixed(2)} A</span>
                                </div>
                                <div className="flex justify-between items-center border-b border-blue-500 pb-2">
                                    <span className="text-blue-100">มิเตอร์ (Meter Size)</span>
                                    <span className="font-bold text-lg">{calculations.meterSize}</span>
                                </div>
                                <div className="flex justify-between items-center border-b border-blue-500 pb-2">
                                    <span className="text-blue-100">เมนเบรกเกอร์ (Main CB)</span>
                                    <span className="font-bold text-lg">{calculations.mainCB} AT</span>
                                </div>
                                <div className="flex justify-between items-center border-b border-blue-500 pb-2">
                                    <span className="text-blue-100">สายเมน (Main Wire IEC01)</span>
                                    <span className="font-bold text-lg">{calculations.mainWire} sq.mm</span>
                                </div>
                                <div className="flex justify-between items-center border-b border-blue-500 pb-2 mt-2">
                                    <span className="text-blue-100">การติดตั้ง</span>
                                    <span className="font-semibold text-right text-sm">
                                        {installMethod === 'conduit_air' ? 'ร้อยท่อในอากาศ' : installMethod === 'surface' ? 'เดินลอยเกาะผนัง' : 'ร้อยท่อฝังดิน'}
                                        {conduitType !== 'none' && <span className="block text-xs text-blue-200">({conduitType.toUpperCase()})</span>}
                                    </span>
                                </div>
                                <div className="flex flex-col pt-2">
                                    <span className="text-blue-100 text-xs mb-1">ตู้ไฟฟ้าที่แนะนำ (อ้างอิง Schneider)</span>
                                    <span className="font-semibold text-sm whitespace-pre-line leading-relaxed bg-blue-700/50 p-3 rounded-lg border border-blue-500/50">
                                        {calculations.panelRecommendation}
                                    </span>
                                </div>
                            </div>
                            <p className="text-xs text-blue-200 mt-4 text-center">*อ้างอิงจากตาราง 3-4 มาตรฐานการไฟฟ้านครหลวง</p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
